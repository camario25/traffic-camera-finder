name: Automated Camera Update

on:
  # Run on the 1st of every 3 months (Jan, Apr, Jul, Oct) at 2am UTC
  schedule:
    - cron: '0 2 1 1,4,7,10 *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  update-cameras:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
      
      - name: Run automated camera update
        id: update
        run: |
          python scripts/auto_update_cameras.py
        continue-on-error: true
      
      - name: Create Pull Request
        if: steps.update.outcome == 'failure'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: automated camera data update'
          branch: automated-camera-update
          delete-branch: true
          title: '🤖 Automated Camera Update - Please Review Coordinates'
          body-path: /tmp/pr_description.md
          labels: automated, camera-update
      
      - name: No changes detected
        if: steps.update.outcome == 'success'
        run: |
          echo "No camera changes detected - data is up to date"
